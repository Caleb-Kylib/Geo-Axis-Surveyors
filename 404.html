<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | GeoAxis Surveyors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg-light);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <section class="error-section">
        <div class="container">
            <h1 class="error-code">404</h1>
            <h2 class="display-5 mb-4">Boundary Not Found</h2>
            <p class="lead mb-5 text-muted">The page you're looking for has moved or hasn't been surveyed yet.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="index.html" class="btn btn-cta px-5">Back to Home</a>
                <a href="contact.html" class="btn btn-outline-success rounded-pill px-5">Report Issue</a>
            </div>
        </div>
    </section>

    <script src="js/navbar.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
